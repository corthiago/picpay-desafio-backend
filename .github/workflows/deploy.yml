name: Build and Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        required: true
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: corthiago/picpay-desafio-backend

jobs:
  metadata:
    name: Resolve deployment target
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      default_domain: ${{ steps.resolve.outputs.default_domain }}
      domain_var: ${{ steps.resolve.outputs.domain_var }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image_var: ${{ steps.resolve.outputs.image_var }}
      service: ${{ steps.resolve.outputs.service }}

    steps:
      - name: Resolve target
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            environment="${{ inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            environment="production"
          else
            environment="staging"
          fi

          if [[ "$environment" == "production" ]]; then
            default_domain="api.example.com"
            domain_var="PRODUCTION_DOMAIN"
            image_tag="production-latest"
            image_var="PRODUCTION_IMAGE"
            service="app-production"
          else
            default_domain="staging.example.com"
            domain_var="STAGING_DOMAIN"
            image_tag="staging-latest"
            image_var="STAGING_IMAGE"
            service="app-staging"
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "default_domain=$default_domain" >> "$GITHUB_OUTPUT"
          echo "domain_var=$domain_var" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_var=$image_var" >> "$GITHUB_OUTPUT"
          echo "service=$service" >> "$GITHUB_OUTPUT"

  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: metadata
    environment: ${{ needs.metadata.outputs.environment }}
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.metadata.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image name
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    environment: ${{ needs.metadata.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        shell: bash
        run: |
          tar -C deploy -czf - . | ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_SSH_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}' && tar -xzf - -C '${{ secrets.DEPLOY_PATH }}'"

      - name: Deploy selected environment
        shell: bash
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN || secrets.APP_DOMAIN || needs.metadata.outputs.default_domain }}
          DEPLOY_IMAGE: ${{ needs.build.outputs.image }}
          DOMAIN_VAR: ${{ needs.metadata.outputs.domain_var }}
          GHCR_TOKEN: ${{ github.token }}
          IMAGE_VAR: ${{ needs.metadata.outputs.image_var }}
          SERVICE: ${{ needs.metadata.outputs.service }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_SSH_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "APP_DOMAIN='$APP_DOMAIN' DEPLOY_IMAGE='$DEPLOY_IMAGE' DOMAIN_VAR='$DOMAIN_VAR' GHCR_TOKEN='$GHCR_TOKEN' IMAGE_VAR='$IMAGE_VAR' SERVICE='$SERVICE' GITHUB_ACTOR='${{ github.actor }}' DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          touch .env

          grep -q '^STAGING_DOMAIN=' .env || printf '%s\n' 'STAGING_DOMAIN=staging.example.com' >> .env
          grep -q '^PRODUCTION_DOMAIN=' .env || printf '%s\n' 'PRODUCTION_DOMAIN=api.example.com' >> .env
          grep -q '^STAGING_IMAGE=' .env || printf '%s\n' 'STAGING_IMAGE=ghcr.io/corthiago/picpay-desafio-backend:staging-latest' >> .env
          grep -q '^PRODUCTION_IMAGE=' .env || printf '%s\n' 'PRODUCTION_IMAGE=ghcr.io/corthiago/picpay-desafio-backend:production-latest' >> .env

          tmpfile="$(mktemp)"
          grep -v -e "^${IMAGE_VAR}=" -e "^${DOMAIN_VAR}=" .env > "$tmpfile"
          printf '%s\n' "${IMAGE_VAR}=${DEPLOY_IMAGE}" >> "$tmpfile"
          printf '%s\n' "${DOMAIN_VAR}=${APP_DOMAIN}" >> "$tmpfile"
          mv "$tmpfile" .env

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker compose -f compose.yml pull "$SERVICE" nginx
          docker compose -f compose.yml up -d nginx "$SERVICE"
          docker image prune -f
          REMOTE_SCRIPT
